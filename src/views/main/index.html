<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vaya</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1 class="app-title">Vaya</h1>
      <span class="app-subtitle">Game Video Auto Editor</span>
    </header>

    <main class="app-main">
      <div id="status-panel" class="status-panel">
        <div class="status-indicator connecting"></div>
        <span id="status-text">Connecting to backend...</span>
      </div>

      <div id="gpu-info" class="gpu-info" style="display: none;">
        <span id="gpu-status"></span>
        <span id="nvenc-status"></span>
      </div>

      <div id="upload-area" class="upload-area" style="display: none;">
        <div class="upload-content">
          <p class="upload-hint">Drop a video file here or click Browse</p>
          <button id="browse-btn" class="btn btn-primary">Browse</button>
        </div>
      </div>
    </main>
  </div>
  <script src="main.ts" type="module"></script>
</body>
</html>
